/* ─── Login overlay ──────────────────────────────────────── */
function LoginOverlay({targetRole,onSuccess,onCancel}){
  const [pwd,setPwd]=useState("");
  const [err,setErr]=useState(false);
  const [shake,setShake]=useState(false);
  const tryLogin=()=>{
    if(pwd===PASSWORDS[targetRole]){onSuccess();}
    else{setErr(true);setShake(true);setTimeout(()=>setShake(false),500);setPwd("");}
  };
  const labels={weddingPlanner:"Wedding Planner",admin:"Admin"};
  return (
    <div style={{position:"fixed",inset:0,background:"linear-gradient(160deg,#3d1f15,#6b2d1a,#2c1510)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}}>
      <div style={{textAlign:"center",padding:"2.5rem",background:"rgba(253,248,244,0.06)",borderRadius:"2rem",border:"1px solid rgba(255,255,255,0.1)",backdropFilter:"blur(10px)",width:"320px",animation:shake?"shake 0.4s ease":"fadeIn 0.3s ease"}}>
        <div style={{fontSize:"2.5rem",marginBottom:"1rem"}}>{targetRole==="admin"?"🔐":"💼"}</div>
        <h2 style={{fontFamily:"'Playfair Display',serif",color:"#fdf8f4",fontSize:"1.4rem",fontWeight:"400",margin:"0 0 0.3rem"}}>Espace {labels[targetRole]}</h2>
        <p style={{color:"#e8c4a8",fontSize:"0.8rem",margin:"0 0 1.5rem",fontStyle:"italic"}}>Accès restreint</p>
        <input type="password" value={pwd} onChange={e=>{setPwd(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&tryLogin()} placeholder="Mot de passe"
          style={{...iStyle,background:"rgba(255,255,255,0.1)",border:`1.5px solid ${err?"#e07070":"rgba(255,255,255,0.2)"}`,color:"white",textAlign:"center",letterSpacing:"0.2em",fontSize:"1.1rem",marginBottom:"0.5rem"}}/>
        {err&&<p style={{color:"#e07070",fontSize:"0.8rem",margin:"0 0 0.8rem",fontStyle:"italic"}}>Mot de passe incorrect</p>}
        <button onClick={tryLogin} style={{...btnP,width:"100%",marginTop:"0.5rem",padding:"0.8rem"}}>Accéder</button>
        <button onClick={onCancel} style={{...btnS,width:"100%",marginTop:"0.6rem",color:"rgba(253,248,244,0.6)",border:"1px solid rgba(255,255,255,0.15)",padding:"0.5rem"}}>Annuler</button>
      </div>
    </div>
  );
}

    setTasks(updated);lsSave(KEYS.tasks,updated);setShowModal(false);
  };
  const del=(id,e)=>{e.stopPropagation();const u=tasks.filter(t=>t.id!==id);setTasks(u);lsSave(KEYS.tasks,u);};
  const cycleStatus=(task,e)=>{e.stopPropagation();const c={todo:"inprogress",inprogress:"done",done:"todo"};const u=tasks.map(t=>t.id===task.id?{...t,status:c[t.status]}:t);setTasks(u);lsSave(KEYS.tasks,u);};

  // Get unique dates
  const dates=[...new Set(tasks.map(t=>t.date||"2026-07-15"))].sort();

  const filtered=useMemo(()=>{
    let t=[...tasks];
    if(filterDate!=="all") t=t.filter(x=>x.date===filterDate);
    if(filterPerson!=="all") t=t.filter(x=>x.assignee===filterPerson);
    return t.sort((a,b)=>{
      const da=a.date||""; const db=b.date||"";
      if(da!==db)return da<db?-1:1;
      return (a.startTime||"").localeCompare(b.startTime||"");
    });
  },[tasks,filterDate,filterPerson]);

  // Group by date for planning
  const byDate=useMemo(()=>{
    const m={};
    filtered.forEach(t=>{
      const d=t.date||"Sans date";
      if(!m[d])m[d]=[];
      m[d].push(t);
    });
    return m;
  },[filtered]);

  const formatDate=(d)=>{
    if(!d||d==="Sans date")return "Sans date";
    const days=["dim","lun","mar","mer","jeu","ven","sam"];
    const months=["janv","févr","mars","avr","mai","juin","juil","août","sept","oct","nov","déc"];
    const dt=new Date(d);
    return `${days[dt.getDay()]} ${dt.getDate()} ${months[dt.getMonth()]} ${dt.getFullYear()}`;
  };

  const statusSymbol={todo:"○",inprogress:"◑",done:"●"};
  const statusColor={todo:"#c5a898",inprogress:"#c47c2a",done:"#3a9d5d"};

  return (
    <div>
      {/* Toolbar */}
      <div style={{display:"flex",gap:"0.5rem",marginBottom:"1.2rem",flexWrap:"wrap",alignItems:"center"}}>
        <select value={filterDate} onChange={e=>setFilterDate(e.target.value)} style={{...iStyle,width:"auto",padding:"0.38rem 0.75rem",fontSize:"0.8rem"}}>
          <option value="all">Toutes les dates</option>
          {dates.map(d=><option key={d} value={d}>{formatDate(d)}</option>)}
        </select>
        <select value={filterPerson} onChange={e=>setFilterPerson(e.target.value)} style={{...iStyle,width:"auto",padding:"0.38rem 0.75rem",fontSize:"0.8rem"}}>
          <option value="all">Toutes les personnes</option>
          {people.map(p=><option key={p} value={p}>{p}</option>)}
        </select>
        {/* Legend */}
        <div style={{display:"flex",gap:"0.6rem",marginLeft:"auto",alignItems:"center",flexWrap:"wrap"}}>
          {Object.entries(CAT_COLORS).slice(0,5).map(([cat,c])=>(
            <span key={cat} style={{display:"flex",alignItems:"center",gap:"0.25rem",fontSize:"0.72rem",color:"#6b4c3b"}}>
              <span style={{width:"8px",height:"8px",borderRadius:"50%",background:c.dot,display:"inline-block"}}/>
              {cat}
            </span>
          ))}
        </div>
        {canEdit&&<button onClick={openNew} style={{...btnP,fontSize:"0.82rem",padding:"0.45rem 0.9rem"}}>+ Tâche</button>}
      </div>

      {/* Planning grid */}
      {Object.keys(byDate).length===0&&<div style={{textAlign:"center",color:"#b89a8e",padding:"3rem",fontStyle:"italic"}}>Aucune tâche</div>}

      {Object.entries(byDate).map(([date,dayTasks])=>(
        <div key={date} style={{marginBottom:"2rem",animation:"slideIn 0.25s ease"}}>
          {/* Day header */}
          <div style={{display:"flex",alignItems:"center",gap:"0.8rem",marginBottom:"1rem"}}>
            <div style={{background:"linear-gradient(135deg,#3d1f15,#6b2d1a)",borderRadius:"0.8rem",padding:"0.4rem 1rem",display:"inline-block"}}>
              <span style={{fontFamily:"'Playfair Display',serif",color:"#fdf8f4",fontSize:"0.9rem",fontWeight:"600"}}>{formatDate(date)}</span>
            </div>
            <div style={{flex:1,height:"1px",background:"linear-gradient(to right,#e8d5c8,transparent)"}}/>
            <span style={{fontSize:"0.75rem",color:"#b89a8e"}}>{dayTasks.length} tâche{dayTasks.length>1?"s":""}</span>
          </div>

          {/* Timeline */}
          <div style={{position:"relative",paddingLeft:"80px"}}>
            {/* Vertical line */}
            <div style={{position:"absolute",left:"64px",top:0,bottom:0,width:"2px",background:"linear-gradient(to bottom,#e8d5c8,#f5ece6)"}}/>

            {dayTasks.map((task,i)=>{
              const cc=catColor(task.category);
              const isExpanded=expandedId===task.id;
              return (
                <div key={task.id} style={{position:"relative",marginBottom:"0.75rem",animation:`fadeIn 0.2s ease ${i*0.04}s both`}}>
                  {/* Time column */}
                  <div style={{position:"absolute",left:"-80px",width:"70px",textAlign:"right",paddingTop:"0.6rem"}}>
                    {task.startTime&&<div style={{fontSize:"0.8rem",fontWeight:"600",color:"#5a3a2a"}}>{task.startTime}</div>}
                    {task.endTime&&task.endTime!==task.startTime&&<div style={{fontSize:"0.68rem",color:"#b89a8e"}}>{task.endTime}</div>}
                  </div>

                  {/* Dot on timeline */}
                  <div style={{position:"absolute",left:"-18px",top:"0.85rem",width:"12px",height:"12px",borderRadius:"50%",background:cc.dot,border:"2px solid white",boxShadow:"0 0 0 2px "+cc.dot+"44"}}/>

                  {/* Card */}
                  <div onClick={()=>setExpandedId(isExpanded?null:task.id)}
                    style={{background:"white",borderRadius:"0.9rem",padding:"0.75rem 1rem",border:`1.5px solid ${cc.border}44`,borderLeft:`3px solid ${cc.border}`,cursor:"pointer",transition:"box-shadow 0.15s",boxShadow:isExpanded?"0 4px 16px rgba(0,0,0,0.08)":"none"}}>

                    <div style={{display:"flex",alignItems:"flex-start",gap:"0.6rem"}}>
                      {/* Status toggle */}
                      <button onClick={e=>cycleStatus(task,e)} title="Changer le statut"
                        style={{background:"none",border:"none",cursor:"pointer",fontSize:"1.1rem",color:statusColor[task.status],flexShrink:0,lineHeight:1,paddingTop:"1px"}}>
                        {statusSymbol[task.status]}
                      </button>

                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"0.5rem"}}>
                          <span style={{fontFamily:"'Playfair Display',serif",fontSize:"0.95rem",color:"#2c1810",fontWeight:"600",textDecoration:task.status==="done"?"line-through":"none",opacity:task.status==="done"?0.5:1}}>
                            {task.title}
                          </span>
                          <div style={{display:"flex",gap:"0.3rem",flexShrink:0,alignItems:"center"}}>
                            <span style={{background:cc.bg,color:cc.dot,borderRadius:"1rem",padding:"0.12rem 0.5rem",fontSize:"0.68rem",fontWeight:"600"}}>{task.category}</span>
                          </div>
                        </div>

                        <div style={{display:"flex",gap:"0.7rem",flexWrap:"wrap",fontSize:"0.75rem",color:"#8b6355",marginTop:"0.25rem"}}>
                          {task.assignee&&<span>👤 {task.assignee}</span>}
                          {task.location&&<span>📍 {task.location}</span>}
                        </div>
                      </div>

                      {canEdit&&(
                        <div style={{display:"flex",gap:"0.2rem",flexShrink:0}}>
                          <button onClick={e=>openEdit(task,e)} style={{background:"none",border:"none",cursor:"pointer",color:"#b89a8e",fontSize:"0.85rem",padding:"2px"}}>✏️</button>
                          <button onClick={e=>del(task.id,e)} style={{background:"none",border:"none",cursor:"pointer",color:"#d4917a",fontSize:"0.85rem",padding:"2px"}}>🗑</button>
                        </div>
                      )}
                    </div>

                    {/* Expanded note */}
                    {isExpanded&&task.note&&(
                      <div style={{marginTop:"0.5rem",paddingTop:"0.5rem",borderTop:"1px dashed #f0e4dc",fontSize:"0.78rem",color:"#a07060",fontStyle:"italic"}}>
                        💬 {task.note}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {/* Stats footer */}
      {tasks.length>0&&(
        <div style={{display:"flex",gap:"1rem",marginTop:"1rem",padding:"0.8rem 1rem",background:"white",borderRadius:"0.9rem",border:"1.5px solid #f0e4dc",flexWrap:"wrap"}}>
          {[["○","À faire","todo","#8b6355"],["◑","En cours","inprogress","#c47c2a"],["●","Terminées","done","#3a9d5d"]].map(([sym,l,s,c])=>(
            <div key={s} style={{display:"flex",alignItems:"center",gap:"0.35rem",fontSize:"0.78rem"}}>
              <span style={{color:c,fontSize:"0.9rem"}}>{sym}</span>
              <span style={{color:c,fontWeight:"600"}}>{tasks.filter(t=>t.status===s).length}</span>
              <span style={{color:"#b89a8e"}}>{l}</span>
            </div>
          ))}
        </div>
      )}

      {/* Edit modal */}
      {showModal&&(
        <Modal title={editT?"Modifier la tâche":"Nouvelle tâche"} onClose={()=>setShowModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:"0.9rem"}}>
            <div><label style={lStyle}>Titre *</label><input style={iStyle} value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Intitulé de la tâche…"/></div>
            <div>
              <label style={lStyle}>Assignée à</label>
              <input style={iStyle} value={form.assignee} onChange={e=>setForm({...form,assignee:e.target.value})} list="plist" placeholder="Nom…"/>
              <datalist id="plist">{guests.map(g=><option key={g.id} value={g.name}/>)}</datalist>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.8rem"}}>
              <div><label style={lStyle}>Catégorie</label>
                <select style={iStyle} value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
                  {cats.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div><label style={lStyle}>Statut</label>
                <select style={iStyle} value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
                  <option value="todo">À faire</option><option value="inprogress">En cours</option><option value="done">Fait</option>
                </select>
              </div>
            </div>
            <div><label style={lStyle}>Date</label><input type="date" style={iStyle} value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.8rem"}}>
              <div><label style={lStyle}>Heure de début</label><input type="time" style={iStyle} value={form.startTime} onChange={e=>setForm({...form,startTime:e.target.value})}/></div>
              <div><label style={lStyle}>Heure de fin</label><input type="time" style={iStyle} value={form.endTime} onChange={e=>setForm({...form,endTime:e.target.value})}/></div>
            </div>
            <div><label style={lStyle}>Lieu</label><input style={iStyle} value={form.location} onChange={e=>setForm({...form,location:e.target.value})} placeholder="Ex: Salle de réception…"/></div>
            <div><label style={lStyle}>Note</label><textarea style={{...iStyle,height:"68px",resize:"vertical"}} value={form.note} onChange={e=>setForm({...form,note:e.target.value})}/></div>
            <div style={{display:"flex",gap:"0.7rem",justifyContent:"flex-end"}}>
              <button style={btnS} onClick={()=>setShowModal(false)}>Annuler</button>
              <button style={btnP} onClick={saveFn}>Enregistrer</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

                <div style={{fontSize:"1rem",marginBottom:"0.2rem"}}>{catIcon[p.category]||"✨"}</div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.8rem"}}>

            <div style={{display:"flex",gap:"0.7rem",justifyContent:"flex-end"}}>

        {bed.night1&&<span style={{fontSize:"0.65rem",color:"#7a5a4a",background:"rgba(0,0,0,0.07)",borderRadius:"1rem",padding:"0.1rem 0.45rem",marginLeft:"auto"}}>par nuit</span>}
      </div>

          </span>
        ))}

    </div>
  );
}

function RoomsTab({rooms,setRooms,guests,canEdit}){
  const [night,setNight]=useState(1);
  const [showRoomModal,setShowRoomModal]=useState(false);
  const [showAssignModal,setShowAssignModal]=useState(false);
  const [editRoom,setEditRoom]=useState(null);
  const [selRoom,setSelRoom]=useState(null);
  const [selBedId,setSelBedId]=useState("");
  const [roomForm,setRoomForm]=useState({name:"",location:""});
  const [customGuest,setCustomGuest]=useState("");
  const [selGuest,setSelGuest]=useState("");

  const assignedThisNight=rooms.flatMap(r=>r.beds.flatMap(b=>bedGuests(b,night)));
  const available=guests.filter(g=>!assignedThisNight.includes(g.name));

  const openRoomEdit=(r)=>{if(!canEdit)return;setEditRoom(r);setRoomForm({name:r.name,location:r.location||""});setShowRoomModal(true);};
  const openNewRoom=()=>{if(!canEdit)return;setEditRoom(null);setRoomForm({name:"",location:""});setShowRoomModal(true);};
  const saveRoom=()=>{
    if(!roomForm.name.trim())return;
    const updated=editRoom?rooms.map(r=>r.id===editRoom.id?{...r,...roomForm}:r):[...rooms,{...roomForm,id:Date.now(),beds:[{bedId:"b"+Date.now(),bedType:"Double",guests:[]}]}];
    setRooms(updated);lsSave(KEYS.rooms,updated);setShowRoomModal(false);
  };
  const delRoom=(id)=>{const u=rooms.filter(r=>r.id!==id);setRooms(u);lsSave(KEYS.rooms,u);};
  const openAssign=(room)=>{if(!canEdit)return;setSelRoom(room);setSelBedId(room.beds[0]?.bedId||"");setSelGuest("");setCustomGuest("");setShowAssignModal(true);};
  const addGuest=()=>{
    const name=(customGuest.trim()||selGuest).trim();
    if(!name||!selRoom||!selBedId)return;
    const updated=rooms.map(r=>{
      if(r.id!==selRoom.id)return r;
      return {...r,beds:r.beds.map(b=>{
        if(b.bedId!==selBedId)return b;
        if(b.night1){
          if(night===1)return {...b,night1:[...(b.night1||[]),name]};
          else return {...b,night2:[...(b.night2||[]),name]};
        }
        if((b.guests||[]).includes(name))return b;
        return {...b,guests:[...(b.guests||[]),name]};
      })};
    });
    setRooms(updated);lsSave(KEYS.rooms,updated);
    setSelRoom(updated.find(r=>r.id===selRoom.id));
    setSelGuest("");setCustomGuest("");
  };
  const removeGuest=(roomId,bedId,gName)=>{
    const updated=rooms.map(r=>{
      if(r.id!==roomId)return r;
      return {...r,beds:r.beds.map(b=>{
        if(b.bedId!==bedId)return b;
        if(b.night1){
          if(night===1)return {...b,night1:(b.night1||[]).filter(g=>g!==gName)};
          else return {...b,night2:(b.night2||[]).filter(g=>g!==gName)};
        }
        return {...b,guests:(b.guests||[]).filter(g=>g!==gName)};
      })};
    });
    setRooms(updated);lsSave(KEYS.rooms,updated);
    if(selRoom?.id===roomId)setSelRoom(updated.find(r=>r.id===roomId));
  };

  const totalPlaced=rooms.flatMap(r=>r.beds.flatMap(b=>bedGuests(b,night))).length;
  const nightLabel=["🌙 Nuit du 14 juillet","🌙 Nuit du 15 juillet"];

  return (
    <div>
      <div style={{display:"flex",gap:"0.4rem",marginBottom:"1.5rem",background:"white",padding:"0.4rem",borderRadius:"1rem",border:"1.5px solid #f0e4dc",width:"fit-content"}}>
        {[1,2].map(n=>(
          <button key={n} onClick={()=>setNight(n)} style={{padding:"0.5rem 1.1rem",borderRadius:"0.7rem",border:"none",cursor:"pointer",fontFamily:"'Lora',serif",fontSize:"0.84rem",fontWeight:night===n?"600":"400",background:night===n?"linear-gradient(135deg,#c4755a,#a85840)":"transparent",color:night===n?"white":"#8b6355",transition:"all 0.2s"}}>
            {nightLabel[n-1]}
          </button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"1rem",marginBottom:"1.5rem"}}>
        {[[rooms.length,"Chambres","#f0e6e0","#8b6355"],[totalPlaced,"Placés cette nuit","#e8f5e9","#3a7d44"],[guests.length-totalPlaced,"Non placés","#fef3e2","#c47c2a"]].map(([c,l,bg,col])=>(
          <div key={l} style={{background:bg,borderRadius:"1rem",padding:"1rem",textAlign:"center"}}>
            <div style={{fontSize:"1.8rem",fontWeight:"700",color:col,fontFamily:"'Playfair Display',serif"}}>{c}</div>
            <div style={{fontSize:"0.75rem",color:col,fontWeight:"700"}}>{l}</div>
          </div>
        ))}
      </div>
      {canEdit&&<div style={{display:"flex",justifyContent:"flex-end",marginBottom:"1rem"}}>
        <button onClick={openNewRoom} style={{...btnP,fontSize:"0.82rem",padding:"0.45rem 0.9rem"}}>+ Chambre</button>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:"1rem"}}>
        {rooms.map(room=>{
          const roomGs=room.beds.flatMap(b=>bedGuests(b,night));
          return (
            <div key={room.id} style={{background:"white",borderRadius:"1.2rem",padding:"1.2rem",border:"1.5px solid #f0e4dc"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"0.8rem"}}>
                <div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1rem",color:"#2c1810",fontWeight:"600"}}>{room.name}</div>
                  {room.location&&<div style={{fontSize:"0.72rem",color:"#b89a8e"}}>📍 {room.location}</div>}
                </div>
                <span style={{fontSize:"0.77rem",color:"#8b6355",fontWeight:"600",background:"#f5ece6",padding:"0.2rem 0.6rem",borderRadius:"2rem",flexShrink:0}}>{roomGs.length} pers.</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"0.5rem",marginBottom:"0.8rem"}}>
                {room.beds.map(bed=>(
                  <BedCard key={bed.bedId} bed={bed} night={night} canEdit={canEdit} onRemove={(bedId,g)=>removeGuest(room.id,bedId,g)}/>
                ))}
              </div>
              {canEdit&&(
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:"0.6rem",borderTop:"1px solid #f5ece6"}}>
                  <button onClick={()=>openAssign(room)} style={{...btnS,fontSize:"0.75rem",padding:"0.3rem 0.7rem"}}>+ Assigner</button>
                  <div style={{display:"flex",gap:"0.3rem"}}>
                    <button onClick={()=>openRoomEdit(room)} style={{background:"none",border:"none",cursor:"pointer",color:"#b89a8e",fontSize:"0.85rem"}}>✏️</button>
                    <button onClick={()=>delRoom(room.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#d4917a",fontSize:"0.85rem"}}>🗑</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {showRoomModal&&(
        <Modal title={editRoom?"Modifier la chambre":"Nouvelle chambre"} onClose={()=>setShowRoomModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:"0.9rem"}}>
            <div><label style={lStyle}>Nom *</label><input style={iStyle} value={roomForm.name} onChange={e=>setRoomForm({...roomForm,name:e.target.value})}/></div>
            <div><label style={lStyle}>Localisation</label><input style={iStyle} value={roomForm.location} onChange={e=>setRoomForm({...roomForm,location:e.target.value})}/></div>
            <div style={{display:"flex",gap:"0.7rem",justifyContent:"flex-end"}}>
              <button style={btnS} onClick={()=>setShowRoomModal(false)}>Annuler</button>
              <button style={btnP} onClick={saveRoom}>Enregistrer</button>
            </div>
          </div>
        </Modal>
      )}
      {showAssignModal&&selRoom&&(
        <Modal title={"Assigner — "+selRoom.name} onClose={()=>setShowAssignModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:"0.9rem"}}>
            <div style={{background:"#f9f2ee",padding:"0.55rem 0.8rem",borderRadius:"0.6rem",fontSize:"0.8rem",color:"#8b6355",fontWeight:"600"}}>{nightLabel[night-1]}</div>
            <div><label style={lStyle}>Lit cible</label>
              <select style={iStyle} value={selBedId} onChange={e=>setSelBedId(e.target.value)}>
                {selRoom.beds.map(b=><option key={b.bedId} value={b.bedId}>{BED_ICONS[b.bedType]||"🛏"} {b.bedType} — {bedGuests(b,night).length} pers.</option>)}
              </select>
            </div>
            {available.length>0&&<div><label style={lStyle}>Invité de la liste</label>
              <select style={iStyle} value={selGuest} onChange={e=>setSelGuest(e.target.value)}>
                <option value="">Choisir…</option>
                {available.map(g=><option key={g.id} value={g.name}>{g.name} ({g.group})</option>)}
              </select>
            </div>}
            <div><label style={lStyle}>Ou saisir un nom</label><input style={iStyle} value={customGuest} onChange={e=>setCustomGuest(e.target.value)} placeholder="Prénom Nom"/></div>
            <button style={btnP} onClick={addGuest}>Ajouter</button>
            <div><label style={lStyle}>État actuel</label>
              {selRoom.beds.map(b=>{
                const gs=bedGuests(b,night);
                return (
                  <div key={b.bedId} style={{background:BED_COLORS[b.bedType]||"#f5f5f5",borderRadius:"0.7rem",padding:"0.5rem 0.8rem",marginBottom:"0.4rem"}}>
                    <div style={{fontSize:"0.73rem",fontWeight:"700",color:"#5a3a2a",marginBottom:"0.3rem"}}>{BED_ICONS[b.bedType]||"🛏"} {b.bedType}</div>

                      {gs.length===0&&<span style={{color:"#b89a8e",fontSize:"0.73rem",fontStyle:"italic"}}>Vide</span>}

                          {g}<button onClick={()=>removeGuest(selRoom.id,b.bedId,g)} style={{background:"none",border:"none",cursor:"pointer",color:"#c4755a",padding:0,fontSize:"0.8rem"}}>×</button>

      )}

  );
}

/* ══════════════════════════════════════════════════════════
   GUESTS TAB
══════════════════════════════════════════════════════════ */
const GROUPS=["Couple","Famille","Témoin","Amis","Prestataire","Autre"];
const GROUP_COLORS={"Couple":"#fce8f5","Famille":"#e8f4fd","Témoin":"#fff0f0","Amis":"#e8f5e9","Prestataire":"#fef3e2","Autre":"#f5f5f5"};
const GROUP_DOTS={"Couple":"#d45c9b","Famille":"#5b9ec9","Témoin":"#c4755a","Amis":"#3a9d5d","Prestataire":"#e6a020","Autre":"#999"};

function GuestsTab({guests,setGuests}){
  const [showModal,setShowModal]=useState(false);
  const [editG,setEditG]=useState(null);
  const blank={name:"",group:"Famille"};
  const [form,setForm]=useState(blank);
  const [search,setSearch]=useState("");
  const [filterGroup,setFilterGroup]=useState("all");

  const openNew=()=>{setEditG(null);setForm(blank);setShowModal(true);};
  const openEdit=(g)=>{setEditG(g);setForm({name:g.name,group:g.group});setShowModal(true);};
  const saveFn=()=>{
    if(!form.name.trim())return;
    let updated;
    if(editG){
      updated=guests.map(g=>g.id===editG.id?{...g,...form}:g);
    } else {
      updated=[...guests,{...form,id:Date.now()}];
    }
    setGuests(updated);lsSave(KEYS.guests,updated);setShowModal(false);
  };
  const del=(id)=>{
    const u=guests.filter(g=>g.id!==id);
    setGuests(u);lsSave(KEYS.guests,u);
  };

  const filtered=guests
    .filter(g=>filterGroup==="all"||g.group===filterGroup)
    .filter(g=>!search||g.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>a.group.localeCompare(b.group)||a.name.localeCompare(b.name));

  // Group counts
  const groupCounts={};
  guests.forEach(g=>{groupCounts[g.group]=(groupCounts[g.group]||0)+1;});

  // Group by group for display
  const byGroup={};
  filtered.forEach(g=>{
    if(!byGroup[g.group])byGroup[g.group]=[];
    byGroup[g.group].push(g);
  });

  return (
    <div>
      {/* Stats pills */}
      <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap",marginBottom:"1.2rem"}}>
        <div style={{background:"linear-gradient(135deg,#3d1f15,#6b2d1a)",borderRadius:"0.8rem",padding:"0.5rem 1rem",display:"flex",alignItems:"center",gap:"0.5rem"}}>
          <span style={{fontFamily:"'Playfair Display',serif",color:"#f5d5b0",fontSize:"1.4rem",fontWeight:"700"}}>{guests.length}</span>
          <span style={{color:"#e8c4a8",fontSize:"0.75rem"}}>personnes</span>
        </div>
        {GROUPS.filter(g=>groupCounts[g]).map(g=>(
          <div key={g} style={{background:GROUP_COLORS[g]||"#f5f5f5",borderRadius:"0.8rem",padding:"0.5rem 0.9rem",display:"flex",alignItems:"center",gap:"0.4rem",border:"1px solid rgba(0,0,0,0.06)"}}>
            <span style={{width:"8px",height:"8px",borderRadius:"50%",background:GROUP_DOTS[g]||"#999",display:"inline-block",flexShrink:0}}/>
            <span style={{fontSize:"0.78rem",fontWeight:"600",color:"#5a3a2a"}}>{groupCounts[g]}</span>
            <span style={{fontSize:"0.75rem",color:"#7a5a4a"}}>{g}</span>
          </div>
        ))}
      </div>

      {/* Toolbar */}
      <div style={{display:"flex",gap:"0.5rem",marginBottom:"1.2rem",flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Rechercher…"
          style={{...iStyle,width:"180px",padding:"0.38rem 0.75rem",fontSize:"0.8rem"}}/>
        <select value={filterGroup} onChange={e=>setFilterGroup(e.target.value)} style={{...iStyle,width:"auto",padding:"0.38rem 0.75rem",fontSize:"0.8rem"}}>
          <option value="all">Tous les groupes</option>
          {GROUPS.map(g=><option key={g} value={g}>{g}</option>)}
        </select>
        <button onClick={openNew} style={{...btnP,marginLeft:"auto",fontSize:"0.82rem",padding:"0.45rem 0.9rem"}}>+ Personne</button>
      </div>

      {/* List grouped */}
      {Object.keys(byGroup).length===0&&<div style={{textAlign:"center",color:"#b89a8e",padding:"2rem",fontStyle:"italic"}}>Aucune personne trouvée</div>}
      {GROUPS.filter(g=>byGroup[g]).map(group=>(
        <div key={group} style={{marginBottom:"1.5rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:"0.6rem",marginBottom:"0.7rem"}}>
            <span style={{width:"10px",height:"10px",borderRadius:"50%",background:GROUP_DOTS[group]||"#999",display:"inline-block",flexShrink:0}}/>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:"0.9rem",color:"#2c1810",fontWeight:"600"}}>{group}</span>
            <span style={{fontSize:"0.73rem",color:"#b89a8e"}}>— {byGroup[group].length} pers.</span>
            <div style={{flex:1,height:"1px",background:"#f0e4dc"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"0.6rem"}}>
            {byGroup[group].map(g=>(
              <div key={g.id} style={{background:"white",borderRadius:"0.9rem",padding:"0.75rem 1rem",border:"1.5px solid #f0e4dc",display:"flex",alignItems:"center",gap:"0.7rem",animation:"fadeIn 0.2s ease"}}>
                <div style={{width:"34px",height:"34px",borderRadius:"50%",background:GROUP_COLORS[g.group]||"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1.5px solid ${GROUP_DOTS[g.group]||"#ddd"}44`,fontSize:"0.85rem",fontWeight:"700",color:GROUP_DOTS[g.group]||"#999"}}>
                  {g.name.charAt(0).toUpperCase()}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:"0.9rem",color:"#2c1810",fontWeight:"600",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.name}</div>
                  <div style={{fontSize:"0.7rem",color:"#b89a8e"}}>{g.group}</div>
                </div>
                <div style={{display:"flex",gap:"0.2rem",flexShrink:0}}>
                  <button onClick={()=>openEdit(g)} style={{background:"none",border:"none",cursor:"pointer",color:"#b89a8e",fontSize:"0.85rem",padding:"2px"}}>✏️</button>
                  <button onClick={()=>del(g.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#d4917a",fontSize:"0.85rem",padding:"2px"}}>🗑</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      ))}

      {showModal&&(
        <Modal title={editG?"Modifier la personne":"Nouvelle personne"} onClose={()=>setShowModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:"0.9rem"}}>
            <div><label style={lStyle}>Prénom & Nom *</label><input style={iStyle} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Ex: Sophie Martin…" autoFocus/></div>
            <div><label style={lStyle}>Groupe</label>
              <select style={iStyle} value={form.group} onChange={e=>setForm({...form,group:e.target.value})}>
                {GROUPS.map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:"0.7rem",justifyContent:"flex-end"}}>
              <button style={btnS} onClick={()=>setShowModal(false)}>Annuler</button>
              <button style={btnP} onClick={saveFn}>Enregistrer</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

        "Vase pour Marie de Lourdes",
        "Plaque pour four",
        "Poubelle midnight snack",
        "Cup noodles + couverts + chips (midnight snack)",
      ],
      confirmer:[
        "Heure d'arrivée La Pastoune — envoyer mail",
        "Menu entrées à partager — confirmer avec Foodtruck",
        "Mobilier Erigoye : 10 mange-debout, 19 tables pliantes (4 VH + 15 salle), 3 tables rectangulaires (honneur + gâteau + plat viande), table ronde (illustratrice), lampe guinguette, bar mobile, 92 chaises Napoléon",
        "Mobilier Souchon : vaisselles, percolateurs, tables hautes, fauteuils photo",
        "Mobilier nous : 3 parasols, coussins, foutas, table pliante, boules pétanque",
        "Enlever bacs devant le foodtruck",
        "Musique clé USB prête (danse d'entrée + première danse)",
        "Confirmer ordre des groupes photos 18h00",
      ]
    }
  },
];

function ProgrammeTab({canEdit,guests,sections,setSections}){
  const [collapsed,setCollapsed]=useState({});
  const [filterSection,setFilterSection]=useState("all");
  const [filterPerson,setFilterPerson]=useState("all");
  const [editing,setEditing]=useState(null);
  const [evTime,setEvTime]=useState("");
  const [evTitle,setEvTitle]=useState("");
  const [evDesc,setEvDesc]=useState("");
  const [evPersons,setEvPersons]=useState([]);
  const [secLabel,setSecLabel]=useState("");
  const [secTitle,setSecTitle]=useState("");
  const [secTime,setSecTime]=useState("");
  const [secSection,setSecSection]=useState("church");
  const [secDot,setSecDot]=useState("#6a9a58");
  const [itemVal,setItemVal]=useState("");

  const closeEdit=()=>{setEditing(null);setEvTime("");setEvTitle("");setEvDesc("");setEvPersons([]);setSecLabel("");setSecTitle("");setSecTime("");setSecSection("church");setSecDot("#6a9a58");setItemVal("");};

  const TAG={prestataire:{bg:"#f0ebe0",color:"#8a6a40",border:"1px solid #ddd0b0"},responsable:{bg:"#e8eef5",color:"#456080",border:"1px solid #c0d0e0"},alert:{bg:"#fceaea",color:"#903030",border:"1px solid #f0c0c0"},todo:{bg:"#e8f0e4",color:"#406030",border:"1px solid #b8d8a8"}};
  const tagStyle=(t)=>({display:"inline-block",fontSize:"10px",fontWeight:"600",letterSpacing:"0.06em",textTransform:"uppercase",padding:"2px 8px",borderRadius:"10px",marginRight:"4px",marginBottom:"4px",...(TAG[t]||TAG.todo)});
  const dotOpts=["#6a9a58","#7a6aaa","#c07850","#4a8aaa","#b89a6e","#c4755a","#6aaa70"];
  const secOpts=[{v:"church",l:"Cérémonie"},{v:"chateau",l:"Vin d'honneur"},{v:"repas",l:"Repas"},{v:"soiree",l:"Soirée"},{v:"all",l:"Toujours visible"}];
  const sfilt=[{id:"all",l:"Tout afficher"},{id:"church",l:"Cérémonie"},{id:"chateau",l:"Vin d'honneur"},{id:"repas",l:"Repas"},{id:"soiree",l:"Soirée"}];

  const allPersons=useMemo(()=>{
    const a=guests.map(g=>g.name);
    const b=sections.flatMap(s=>(s.events||[]).flatMap(e=>e.persons||[]));
    return[...new Set([...a,...b])].sort();
  },[guests,sections]);

  const visible=useMemo(()=>sections.filter(sec=>{
    const ok=filterSection==="all"||sec.section===filterSection||sec.section==="all";
    if(!ok)return false;
    if(filterPerson==="all")return true;
    return(sec.events||[]).some(ev=>(ev.persons||[]).includes(filterPerson));
  }),[sections,filterSection,filterPerson]);

  const visEvs=(sec)=>{if(!sec.events)return[];if(filterPerson==="all")return sec.events;return sec.events.filter(ev=>(ev.persons||[]).includes(filterPerson));};
  const updSec=(secId,fn)=>setSections(p=>p.map(s=>s.id===secId?fn(s):s));
  const stopToggle=(id,e)=>{if(e)e.stopPropagation();setCollapsed(p=>({...p,[id]:!p[id]}));};

  const saveEvent=()=>{
    if(!evTitle.trim())return;
    const ev={time:evTime,title:evTitle,desc:evDesc,tags:[],persons:evPersons};
    const isNew=editing.type==="newEvent";
    updSec(editing.secId,sec=>{const evs=[...(sec.events||[])];if(isNew)evs.push(ev);else evs[editing.evIdx]=ev;return{...sec,events:evs};});
    closeEdit();
  };
  const delEvent=(secId,idx,e)=>{e.stopPropagation();updSec(secId,s=>({...s,events:s.events.filter((_,i)=>i!==idx)}));};
  const openEditEv=(secId,idx,e)=>{e.stopPropagation();const sec=sections.find(s=>s.id===secId);const ev=sec.events[idx];setEvTime(ev.time||"");setEvTitle(ev.title||"");setEvDesc(ev.desc||"");setEvPersons(ev.persons||[]);setEditing({type:"event",secId,evIdx:idx});};
  const openNewEv=(secId,e)=>{e.stopPropagation();setEvTime("");setEvTitle("");setEvDesc("");setEvPersons([]);setEditing({type:"newEvent",secId});};

  const saveSec=()=>{
    if(!secTitle.trim())return;
    if(editing.type==="newSection"){const id="s"+Date.now();setSections(p=>[...p,{id,label:secLabel,title:secTitle,time:secTime,section:secSection,dot:secDot,events:[]}]);}
    else updSec(editing.secId,s=>({...s,label:secLabel,title:secTitle,time:secTime,section:secSection,dot:secDot}));
    closeEdit();
  };
  const delSec=(id,e)=>{e.stopPropagation();if(!window.confirm("Supprimer cette section ?"))return;setSections(p=>p.filter(s=>s.id!==id));};
  const openEditSec=(sec,e)=>{e.stopPropagation();setSecLabel(sec.label);setSecTitle(sec.title);setSecTime(sec.time||"");setSecSection(sec.section);setSecDot(sec.dot);setEditing({type:"section",secId:sec.id});};

  const saveResp=()=>{
    if(!itemVal.trim())return;
    const[name,...rest]=itemVal.split("|");
    const entry={name:name.trim(),role:rest.join("|").trim()};
    const isNew=editing.type==="newResp";
    updSec(editing.secId,s=>{const r=[...(s.responsables||[])];if(isNew)r.push(entry);else r[editing.itemIdx]=entry;return{...s,responsables:r};});
    closeEdit();
  };
  const delResp=(secId,idx,e)=>{e.stopPropagation();updSec(secId,s=>({...s,responsables:s.responsables.filter((_,i)=>i!==idx)}));};
  const openEditResp=(secId,idx,e)=>{e.stopPropagation();const s=sections.find(x=>x.id===secId);const r=s.responsables[idx];setItemVal(r.name+(r.role?"|"+r.role:""));setEditing({type:"resp",secId,itemIdx:idx});};
  const openNewResp=(secId,e)=>{e.stopPropagation();setItemVal("");setEditing({type:"newResp",secId});};

  const saveItem=(listType)=>{
    if(!itemVal.trim())return;
    const isNew=editing.type==="newItem";
    updSec(editing.secId,s=>{const cl={...s.checklist};const arr=[...cl[listType]];if(isNew)arr.push(itemVal.trim());else arr[editing.itemIdx]=itemVal.trim();return{...s,checklist:{...cl,[listType]:arr}};});
    closeEdit();
  };
  const delItem=(secId,listType,idx,e)=>{e.stopPropagation();updSec(secId,s=>{const cl={...s.checklist};cl[listType]=cl[listType].filter((_,i)=>i!==idx);return{...s,checklist:cl};});};
  const openEditItem=(secId,listType,idx,e)=>{e.stopPropagation();const s=sections.find(x=>x.id===secId);setItemVal(s.checklist[listType][idx]);setEditing({type:"item",secId,listType,itemIdx:idx});};
  const openNewItem=(secId,listType,e)=>{e.stopPropagation();setItemVal("");setEditing({type:"newItem",secId,listType});};

  const togglePerson=(p)=>{setEvPersons(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p]);};

  const formBox=(title,onSave,children)=>(
    <div style={{background:"#fdf8f4",border:"1.5px solid #c4755a",borderRadius:"10px",padding:"0.9rem",marginTop:"6px",display:"flex",flexDirection:"column",gap:"0.7rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:"0.72rem",fontWeight:"700",color:"#c4755a",textTransform:"uppercase",letterSpacing:"0.07em"}}>{title}</span>
        <button onClick={e=>{e.stopPropagation();closeEdit();}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"1.1rem",color:"#8b6355",lineHeight:1}}>×</button>
      </div>
      {children}
      <div style={{display:"flex",gap:"0.5rem",justifyContent:"flex-end"}}>
        <button style={btnS} onClick={e=>{e.stopPropagation();closeEdit();}}>Annuler</button>
        <button style={btnP} onClick={e=>{e.stopPropagation();onSave();}}>Enregistrer</button>
      </div>
    </div>
  );

  const editBtns=(onEdit,onDel)=>(
    <div style={{display:"flex",gap:"2px",flexShrink:0,marginLeft:"4px"}}>
      <button onClick={onEdit} style={{background:"none",border:"none",cursor:"pointer",color:"#b89a8e",fontSize:"0.8rem",padding:"2px"}}>✏️</button>
      <button onClick={onDel} style={{background:"none",border:"none",cursor:"pointer",color:"#d4917a",fontSize:"0.8rem",padding:"2px"}}>🗑</button>
    </div>
  );

  const secFormFields=(
    <>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem"}}>
        <div><label style={lStyle}>Libellé court</label><input style={iStyle} value={secLabel} onChange={e=>setSecLabel(e.target.value)} placeholder="Ex: Cérémonie…"/></div>
        <div><label style={lStyle}>Horaire</label><input style={iStyle} value={secTime} onChange={e=>setSecTime(e.target.value)} placeholder="14h30 – 16h15"/></div>
      </div>
      <div><label style={lStyle}>Titre *</label><input style={iStyle} value={secTitle} onChange={e=>setSecTitle(e.target.value)}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem"}}>
        <div><label style={lStyle}>Catégorie</label>
          <select style={iStyle} value={secSection} onChange={e=>setSecSection(e.target.value)}>
            {secOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
          </select>
        </div>
        <div><label style={lStyle}>Couleur</label>
          <div style={{display:"flex",gap:"5px",marginTop:"4px",flexWrap:"wrap"}}>
            {dotOpts.map(c=><button key={c} onClick={e=>{e.stopPropagation();setSecDot(c);}} style={{width:"22px",height:"22px",borderRadius:"50%",background:c,border:`3px solid ${secDot===c?"#2c1810":"transparent"}`,cursor:"pointer"}}/>)}
          </div>
        </div>
      </div>
    </>
  );

  const evFormFields=(
    <>
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:"0.6rem"}}>
        <div><label style={lStyle}>Heure</label><input style={iStyle} value={evTime} onChange={e=>setEvTime(e.target.value)} placeholder="19h00…"/></div>
        <div><label style={lStyle}>Titre *</label><input style={iStyle} value={evTitle} onChange={e=>setEvTitle(e.target.value)}/></div>
      </div>
      <div><label style={lStyle}>Description</label><textarea style={{...iStyle,height:"56px",resize:"vertical"}} value={evDesc} onChange={e=>setEvDesc(e.target.value)}/></div>
      <div>
        <label style={lStyle}>Personnes concernées</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginTop:"4px",padding:"8px",background:"white",borderRadius:"8px",border:"1.5px solid #d9c9bf"}}>
          {allPersons.map(p=>{const sel=evPersons.includes(p);return<button key={p} onClick={e=>{e.stopPropagation();togglePerson(p);}} style={{fontSize:"11px",padding:"3px 10px",borderRadius:"12px",border:`1px solid ${sel?"#c4755a":"#d9c9bf"}`,background:sel?"#f5e8e0":"white",color:sel?"#c4755a":"#8b6355",cursor:"pointer",fontFamily:"'Lora',serif"}}>{p}</button>;})}
        </div>
      </div>
    </>
  );

  return(
    <div style={{fontFamily:"'Lora',serif"}}>
      {/* Filters */}
      <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"1.5rem",alignItems:"center"}}>
        <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
          {sfilt.map(f=>(
            <button key={f.id} onClick={()=>setFilterSection(f.id)}
              style={{fontSize:"11px",padding:"5px 14px",borderRadius:"20px",border:`1px solid ${filterSection===f.id?"#c4755a":"#f0e4dc"}`,background:filterSection===f.id?"#f5e8e0":"transparent",color:filterSection===f.id?"#c4755a":"#8b6355",cursor:"pointer",fontFamily:"'Lora',serif"}}>
              {f.l}
            </button>
          ))}
        </div>
        <select value={filterPerson} onChange={e=>setFilterPerson(e.target.value)}
          style={{...iStyle,width:"auto",padding:"0.32rem 0.75rem",fontSize:"0.8rem",marginLeft:"auto"}}>
          <option value="all">Toutes les personnes</option>
          {allPersons.map(p=><option key={p} value={p}>{p}</option>)}
        </select>
      </div>

      {visible.map(sec=>{
        const evs=visEvs(sec);
        const isEditSec=editing&&editing.type==="section"&&editing.secId===sec.id;
        return(
          <div key={sec.id} style={{marginBottom:"1.5rem",borderRadius:"12px",overflow:"hidden",border:"1.5px solid #f0e4dc",background:"white"}}>
            {/* Header */}
            <div style={{padding:"0.9rem 1.1rem",display:"flex",alignItems:"center",gap:"10px",background:"white",cursor:"pointer"}} onClick={e=>stopToggle(sec.id,e)}>
              <div style={{width:"9px",height:"9px",borderRadius:"50%",background:sec.dot,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:"10px",fontWeight:"700",letterSpacing:"0.14em",textTransform:"uppercase",color:"#b89a8e",marginBottom:"1px"}}>{sec.label}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.05rem",fontWeight:"600",color:"#2c1810"}}>{sec.title}</div>
              </div>
              {sec.time&&<div style={{fontSize:"11px",color:"#b89a8e",whiteSpace:"nowrap"}}>{sec.time}</div>}
              {canEdit&&(
                <div style={{display:"flex",gap:"4px",marginLeft:"8px"}} onClick={e=>e.stopPropagation()}>
                  {sec.events&&<button onClick={e=>openNewEv(sec.id,e)} style={{background:"none",border:"1px solid #f0e4dc",borderRadius:"6px",cursor:"pointer",color:"#c4755a",fontSize:"0.7rem",padding:"2px 8px",fontFamily:"'Lora',serif"}}>+ Étape</button>}
                  <button onClick={e=>openEditSec(sec,e)} style={{background:"none",border:"none",cursor:"pointer",color:"#b89a8e",fontSize:"0.8rem",padding:"2px"}}>✏️</button>
                  <button onClick={e=>delSec(sec.id,e)} style={{background:"none",border:"none",cursor:"pointer",color:"#d4917a",fontSize:"0.8rem",padding:"2px"}}>🗑</button>
                </div>
              )}
              <div style={{color:"#b89a8e",fontSize:"13px",transition:"transform 0.2s",transform:collapsed[sec.id]?"rotate(-90deg)":"rotate(0deg)",marginLeft:"4px"}}>▾</div>
            </div>

            {/* Section edit */}
            {isEditSec&&<div style={{padding:"0 1rem 0.5rem"}} onClick={e=>e.stopPropagation()}>{formBox(editing.type==="newSection"?"Nouvelle section":"Modifier la section",saveSec,secFormFields)}</div>}

            {!collapsed[sec.id]&&(
              <div style={{borderTop:"1px solid #f0e4dc"}}>
                {/* Events */}
                {sec.events&&(
                  <div style={{padding:"0.8rem 1.1rem"}}>
                    {evs.length===0&&filterPerson!=="all"&&<div style={{fontSize:"0.78rem",color:"#b89a8e",fontStyle:"italic"}}>Aucune étape pour cette personne.</div>}
                    {evs.map((ev,i)=>{
                      const ri=sec.events.indexOf(ev);
                      const isEditEv=editing&&editing.type==="event"&&editing.secId===sec.id&&editing.evIdx===ri;
                      return(
                        <div key={i} style={{borderBottom:i<evs.length-1&&!isEditEv?"1px solid #f5ece6":"none"}}>
                          <div style={{display:"flex",gap:"12px",alignItems:"flex-start",padding:"0.5rem 0"}}>
                            <div style={{fontSize:"11px",fontWeight:"600",color:"#b89a6e",minWidth:"56px",paddingTop:"2px"}}>{ev.time}</div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:"0.88rem",fontWeight:"600",color:"#2c1810",marginBottom:"2px",fontFamily:"'Playfair Display',serif"}}>{ev.title}</div>
                              {ev.tags&&ev.tags.length>0&&<div style={{marginTop:"3px",marginBottom:"3px"}}>{ev.tags.map((tg,j)=><span key={j} style={tagStyle(tg.t)}>{tg.l}</span>)}</div>}
                              {ev.desc&&<div style={{fontSize:"0.78rem",color:"#8b6355",lineHeight:"1.55"}}>{ev.desc}</div>}
                            </div>
                            {canEdit&&editBtns(e=>openEditEv(sec.id,ri,e),e=>delEvent(sec.id,ri,e))}
                          </div>
                          {isEditEv&&<div onClick={e=>e.stopPropagation()}>{formBox("Modifier l'étape",saveEvent,evFormFields)}</div>}
                        </div>
                      );
                    })}
                    {editing&&editing.type==="newEvent"&&editing.secId===sec.id&&(
                      <div onClick={e=>e.stopPropagation()}>{formBox("Nouvelle étape",saveEvent,evFormFields)}</div>
                    )}
                  </div>
                )}

                {/* Notes */}
                {sec.notes&&sec.notes.map((n,ni)=>(
                  <div key={ni} style={{padding:"0.6rem 1.1rem 0.8rem",background:"#fdf8f4",borderTop:"1px solid #f0e4dc"}}>
                    <div style={{fontSize:"10px",fontWeight:"700",letterSpacing:"0.1em",textTransform:"uppercase",color:"#b89a8e",marginBottom:"0.4rem"}}>{n.title}</div>
                    {n.items.map((item,ii)=><div key={ii} style={{fontSize:"0.78rem",color:"#5a3a2a",lineHeight:"1.6",paddingLeft:"1rem",position:"relative"}}><span style={{position:"absolute",left:0,color:"#b89a6e"}}>—</span>{item}</div>)}
                  </div>
                ))}

                {/* Responsables */}
                {sec.responsables&&(
                  <div style={{padding:"0.8rem 1.1rem"}}>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:"7px"}}>
                      {sec.responsables.map((r,ri)=>{
                        const isEditR=editing&&editing.type==="resp"&&editing.secId===sec.id&&editing.itemIdx===ri;
                        return(
                          <div key={ri}>
                            <div style={{background:"#fdf8f4",border:"1px solid #f0e4dc",borderRadius:"8px",padding:"7px 10px",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"4px"}}>
                              <div>
                                <div style={{fontSize:"0.82rem",fontWeight:"600",color:"#2c1810",fontFamily:"'Playfair Display',serif"}}>{r.name}</div>
                                <div style={{fontSize:"0.72rem",color:"#8b6355"}}>{r.role}</div>
                              </div>
                              {canEdit&&editBtns(e=>openEditResp(sec.id,ri,e),e=>delResp(sec.id,ri,e))}
                            </div>
                            {isEditR&&<div onClick={e=>e.stopPropagation()}>{formBox("Modifier",saveResp,<div><label style={lStyle}>Nom | Rôle</label><input style={iStyle} value={itemVal} onChange={e=>setItemVal(e.target.value)} placeholder="Larissa | Wedding planner…"/></div>)}</div>}
                          </div>
                        );
                      })}
                    </div>
                    {editing&&editing.type==="newResp"&&editing.secId===sec.id&&(
                      <div onClick={e=>e.stopPropagation()}>{formBox("Nouveau responsable",saveResp,<div><label style={lStyle}>Nom | Rôle</label><input style={iStyle} value={itemVal} onChange={e=>setItemVal(e.target.value)} placeholder="Larissa | Wedding planner…"/></div>)}</div>
                    )}
                    {canEdit&&!(editing&&["newResp","resp"].includes(editing.type)&&editing.secId===sec.id)&&(
                      <button onClick={e=>openNewResp(sec.id,e)} style={{...btnS,fontSize:"0.78rem",padding:"0.3rem 0.7rem",marginTop:"8px"}}>+ Responsable</button>
                    )}
                  </div>
                )}

                {/* Checklist */}
                {sec.checklist&&(
                  <div>
                    {[{key:"achats",title:"À acheter — lundi 13 juillet",bg:"#fdf8f4"},{key:"confirmer",title:"À confirmer avec les prestataires",bg:"white"}].map(({key,title,bg})=>(
                      <div key={key} style={{padding:"0.6rem 1.1rem 0.8rem",background:bg,borderTop:"1px solid #f0e4dc"}}>
                        <div style={{fontSize:"10px",fontWeight:"700",letterSpacing:"0.1em",textTransform:"uppercase",color:"#b89a8e",marginBottom:"0.4rem"}}>{title}</div>
                        {sec.checklist[key].map((item,i)=>{
                          const isEditItem=editing&&editing.type==="item"&&editing.secId===sec.id&&editing.listType===key&&editing.itemIdx===i;
                          return(
                            <div key={i}>
                              <div style={{display:"flex",alignItems:"center",paddingLeft:"1rem",position:"relative"}}>
                                <span style={{position:"absolute",left:0,color:"#b89a6e"}}>—</span>
                                <div style={{fontSize:"0.78rem",color:"#5a3a2a",lineHeight:"1.6",flex:1}}>{item}</div>
                                {canEdit&&editBtns(e=>openEditItem(sec.id,key,i,e),e=>delItem(sec.id,key,i,e))}
                              </div>
                              {isEditItem&&<div onClick={e=>e.stopPropagation()}>{formBox("Modifier",()=>saveItem(key),<input style={iStyle} value={itemVal} onChange={e=>setItemVal(e.target.value)}/>)}</div>}
                            </div>
                          );
                        })}
                        {editing&&editing.type==="newItem"&&editing.secId===sec.id&&editing.listType===key&&(
                          <div onClick={e=>e.stopPropagation()}>{formBox("Nouvel élément",()=>saveItem(key),<input style={iStyle} value={itemVal} onChange={e=>setItemVal(e.target.value)} placeholder="Nouvel élément…"/>)}</div>
                        )}
                        {canEdit&&!(editing&&["newItem","item"].includes(editing.type)&&editing.secId===sec.id&&editing.listType===key)&&(
                          <button onClick={e=>openNewItem(sec.id,key,e)} style={{...btnS,fontSize:"0.78rem",padding:"0.3rem 0.7rem",marginTop:"6px"}}>+ Élément</button>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}

      {/* Nouvelle section */}
      {canEdit&&(
        <div style={{marginTop:"0.5rem"}}>
          {editing&&editing.type==="newSection"
            ?<div onClick={e=>e.stopPropagation()}>{formBox("Nouvelle section",saveSec,secFormFields)}</div>
            :<button onClick={()=>setEditing({type:"newSection"})} style={{...btnS,width:"100%",textAlign:"center",fontSize:"0.82rem"}}>+ Nouvelle section</button>
          }
        </div>
      )}

      {/* Legend */}
      <div style={{display:"flex",gap:"12px",flexWrap:"wrap",justifyContent:"center",marginTop:"1.5rem",paddingTop:"1rem",borderTop:"1px solid #f0e4dc"}}>
        {[["prestataire","Prestataire"],["responsable","Responsable"],["alert","Ne pas oublier"],["todo","À confirmer"]].map(([t,l])=>(
          <span key={t} style={tagStyle(t)}>{l}</span>
        ))}
      </div>
    </div>

          if(id==="seating") return (
            <a key={id} href="https://pleasecallmefi.github.io/ordrephoto/" target="_blank" rel="noopener noreferrer"
              style={{padding:"0.9rem 1rem",background:"none",border:"none",cursor:"pointer",borderBottom:"2.5px solid transparent",marginBottom:"-2px",fontFamily:"'Lora',serif",fontSize:"0.85rem",color:"#8b6355",fontWeight:"400",transition:"all 0.2s",whiteSpace:"nowrap",textDecoration:"none",display:"flex",alignItems:"center",gap:"0.3rem"}}>
              {label} <span style={{fontSize:"0.65rem",opacity:0.6}}>↗</span>
            </a>
          );
          return (
            <button key={id} onClick={()=>setTab(id)} style={{padding:"0.9rem 1rem",background:"none",border:"none",cursor:"pointer",borderBottom:tab===id?"2.5px solid #c4755a":"2.5px solid transparent",marginBottom:"-2px",fontFamily:"'Lora',serif",fontSize:"0.85rem",color:tab===id?"#c4755a":"#8b6355",fontWeight:tab===id?"600":"400",transition:"all 0.2s",whiteSpace:"nowrap"}}>
              {label}
            </button>
          );
        })}
      </div>

      {/* Content */}
      <div style={{padding:"1.4rem",maxWidth:"960px",margin:"0 auto"}}>
        {tab==="programme"&&<ProgrammeTab canEdit={role==="admin"} guests={guests} sections={sections} setSections={s=>{setSections(s);lsSave("sections",s);}}/>}
        {tab==="deroul"&&<DeroulTab/>}
        {tab==="rooms"&&<RoomsTab rooms={rooms} setRooms={setRooms} guests={guests} canEdit={canEditRooms}/>}
        {tab==="providers"&&canSeeProviders&&<ProvidersTab providers={providers} setProviders={setProviders} canEdit={canEditProviders}/>}
        {tab==="guests"&&canEditTasks&&<GuestsTab guests={guests} setGuests={setGuests}/>}
        {tab==="seating"&&canEditTasks&&<SeatingTab tables={tables} setTables={setTables} guests={guests}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
