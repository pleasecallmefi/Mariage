  const saveRoom=()=>{
    if(!roomForm.name.trim())return;
    const updated=editRoom?rooms.map(r=>r.id===editRoom.id?{...r,...roomForm}:r):[...rooms,{...roomForm,id:Date.now(),guests:[]}];

    if(selRoom?.id===roomId)setSelRoom({...selRoom,guests:selRoom.guests.filter(g=>g!==gName)});

        React.createElement('div',{key:l,style:{background:bg,borderRadius:"1rem",padding:"1rem",textAlign:"center"}},
          React.createElement('div',{style:{fontSize:"1.8rem",fontWeight:"700",color:col,fontFamily:"'Playfair Display',serif"}},c),
          React.createElement('div',{style:{fontSize:"0.75rem",color:col,fontWeight:"700"}},l)
        )

    isAdmin&&React.createElement('div',{style:{display:"flex",justifyContent:"flex-end",marginBottom:"1rem"}},
      React.createElement('button',{onClick:openNewRoom,style:{...btnP,fontSize:"0.82rem",padding:"0.45rem 0.9rem"}},"+ Chambre")
    ),
    React.createElement('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:"1rem"}},
      rooms.map(room=>{

        return React.createElement('div',{key:room.id,style:{background:"white",borderRadius:"1.2rem",padding:"1.2rem",border:"1.5px solid #f0e4dc",animation:"fadeIn 0.2s ease"}},

            React.createElement('div',null,

              React.createElement('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:"0.95rem",color:"#2c1810",fontWeight:"600"}},room.name),
              room.location&&React.createElement('div',{style:{fontSize:"0.72rem",color:"#b89a8e"}},"📍 "+room.location)

            React.createElement('div',{style:{width:(occ2*100)+"%",height:"100%",background:occ2>=1?"#c4755a":"#7bc47a",borderRadius:"1rem",transition:"width 0.3s"}})

            room.guests.length===0&&React.createElement('span',{style:{color:"#c5a898",fontSize:"0.78rem",fontStyle:"italic"}},"Vide"),
            room.guests.map(g=>React.createElement('span',{key:g,style:{background:"#fdf0ea",color:"#8b6355",borderRadius:"2rem",padding:"0.18rem 0.55rem",fontSize:"0.73rem",display:"flex",alignItems:"center",gap:"0.25rem"}},
              g,
              isAdmin&&React.createElement('button',{onClick:()=>removeGuest(room.id,g),style:{background:"none",border:"none",cursor:"pointer",color:"#c4755a",padding:0,fontSize:"0.85rem",lineHeight:1}},"×")
            ))
          ),
          isAdmin&&React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            React.createElement('button',{onClick:()=>openAssign(room),style:{...btnS,fontSize:"0.75rem",padding:"0.3rem 0.7rem"}},"+ Assigner"),
            React.createElement('div',{style:{display:"flex",gap:"0.3rem"}},
              React.createElement('button',{onClick:()=>openRoomEdit(room),style:{background:"none",border:"none",cursor:"pointer",color:"#b89a8e",fontSize:"0.85rem"}},"✏️"),

        ),
        React.createElement('div',{style:{display:"flex",gap:"0.7rem",justifyContent:"flex-end"}},
          React.createElement('button',{style:btnS,onClick:()=>setShowRoomModal(false)},"Annuler"),
          React.createElement('button',{style:btnP,onClick:saveRoom},"Enregistrer")
        )
      )

    showAssignModal&&selRoom&&React.createElement(Modal,{title:"Chambre : "+selRoom.name,onClose:()=>setShowAssignModal(false)},
      React.createElement('div',{style:{display:"flex",flexDirection:"column",gap:"1rem"}},
        React.createElement('div',{style:{fontSize:"0.82rem",color:"#8b6355",background:"#f9f2ee",padding:"0.6rem 0.8rem",borderRadius:"0.6rem"}},selRoom.guests.length+"/"+selRoom.capacity+" places occupées"),
        available.length>0&&React.createElement('div',null,
          React.createElement('label',{style:lStyle},"Invité de la liste"),
          React.createElement('select',{style:iStyle,value:selGuest,onChange:e=>setSelGuest(e.target.value)},

        React.createElement('button',{style:btnP,onClick:addGuest},"Ajouter à la chambre"),

// ─── APP ───
function App() {
  const [tab,setTab]=useState("tasks");
  const [tasks,setTasks]=useState(initTasks);
  const [providers,setProviders]=useState(initProviders);
  const [rooms,setRooms]=useState(initRooms);
  const guests=initGuests;
  const [loaded,setLoaded]=useState(false);
  const [isAdmin,setIsAdmin]=useState(false);
  const [showAdminLock,setShowAdminLock]=useState(false);

  useEffect(()=>{
    const t=lsLoad(KEYS.tasks);
    const p=lsLoad(KEYS.providers);
    const r=lsLoad(KEYS.rooms);
    if(t)setTasks(t);
    if(p)setProviders(p);
    if(r)setRooms(r);
    setLoaded(true);
  },[]);

  const daysLeft=Math.ceil((new Date("2026-07-15")-new Date())/86400000);

  if(!loaded)return React.createElement('div',{style:{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",fontFamily:"'Playfair Display',serif",color:"#c4755a",fontSize:"1.2rem"}},"Chargement…");

  return React.createElement('div',{style:{minHeight:"100vh",background:"#fdf8f4",fontFamily:"'Lora',serif"}},
    showAdminLock&&React.createElement(AdminLock,{onUnlock:()=>{setIsAdmin(true);setShowAdminLock(false);}}),

    // Header
    React.createElement('div',{style:{background:"linear-gradient(135deg,#3d1f15 0%,#6b2d1a 50%,#8b3a20 100%)",padding:"1.8rem 1.5rem 1.4rem",textAlign:"center",position:"relative",overflow:"hidden"}},
      React.createElement('div',{style:{position:"absolute",inset:0,opacity:0.04,backgroundImage:"radial-gradient(circle at 25% 50%,white 1px,transparent 1px),radial-gradient(circle at 75% 20%,white 1px,transparent 1px)",backgroundSize:"40px 40px"}}),
      React.createElement('div',{style:{position:"absolute",top:"1rem",right:"1rem"}},
        isAdmin
          ? React.createElement('button',{onClick:()=>setIsAdmin(false),style:{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:"2rem",color:"#fdf8f4",fontSize:"0.73rem",padding:"0.3rem 0.7rem",cursor:"pointer",fontFamily:"'Lora',serif"}},"🔓 Admin")
          : React.createElement('button',{onClick:()=>setShowAdminLock(true),style:{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:"2rem",color:"rgba(253,248,244,0.6)",fontSize:"0.73rem",padding:"0.3rem 0.7rem",cursor:"pointer",fontFamily:"'Lora',serif"}},"🔐")
      ),
      React.createElement('div',{style:{fontSize:"1.6rem",marginBottom:"0.3rem"}},"💍"),
      React.createElement('h1',{style:{fontFamily:"'Playfair Display',serif",fontSize:"1.65rem",color:"#fdf8f4",fontWeight:"400",letterSpacing:"0.03em",margin:"0 0 0.25rem"}},"Notre Mariage"),
      React.createElement('p',{style:{color:"#e8c4a8",fontSize:"0.82rem",margin:"0 0 0.8rem",fontStyle:"italic"}},"15 juillet 2026"),
      React.createElement('div',{style:{display:"inline-flex",alignItems:"center",gap:"0.5rem",background:"rgba(255,255,255,0.12)",borderRadius:"2rem",padding:"0.35rem 1rem"}},
        React.createElement('span',{style:{color:"#f5d5b0",fontSize:"1.3rem",fontFamily:"'Playfair Display',serif",fontWeight:"700"}},daysLeft),
        React.createElement('span',{style:{color:"#e8c4a8",fontSize:"0.76rem"}},"jours restants")
      )

    // Tabs
    React.createElement('div',{style:{display:"flex",borderBottom:"2px solid #f0e4dc",background:"white",padding:"0 0.5rem"}},
      [["tasks","🗂 Tâches"],["providers","🤝 Prestataires"],["rooms","🏠 Chambres"]].map(([id,label])=>
        React.createElement('button',{key:id,onClick:()=>setTab(id),style:{padding:"0.9rem 1rem",background:"none",border:"none",cursor:"pointer",borderBottom:tab===id?"2.5px solid #c4755a":"2.5px solid transparent",marginBottom:"-2px",fontFamily:"'Lora',serif",fontSize:"0.85rem",color:tab===id?"#c4755a":"#8b6355",fontWeight:tab===id?"600":"400",transition:"all 0.2s",whiteSpace:"nowrap"}},label)

      tab==="rooms"&&React.createElement(RoomsTab,{rooms,setRooms,guests,isAdmin})

}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
